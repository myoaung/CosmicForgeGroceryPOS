name: Cosmic Forge POS CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.19.0'
  COVERAGE_THRESHOLD: '70'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  analyze-test:
    name: Lint / Analyze / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage
      - name: Enforce Coverage Threshold
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          lcov --summary coverage/lcov.info
          COVERAGE=$(lcov --summary coverage/lcov.info 2>/dev/null | awk '/lines/{print $2}' | tr -d '%')
          echo "Coverage lines: ${COVERAGE}%"
          COVERAGE_INT=${COVERAGE%.*}
          if [ "${COVERAGE_INT}" -lt "${COVERAGE_THRESHOLD}" ]; then
            echo "Coverage gate failed: ${COVERAGE}% < ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
      - name: Trivy Filesystem Security Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          vuln-type: library,config,secret
          exit-code: '1'
          ignore-unfixed: true
      - name: Setup Snyk
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@master
      - name: Snyk Open Source Scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "$SNYK_TOKEN"
          snyk test --all-projects --severity-threshold=high

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter pub outdated --json > dependency_audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: dependency_audit.json

  build-android:
    name: Build Android
    needs: [analyze-test, security-scan, dependency-audit]
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Generate Secrets
        env:
          ENV_FILE_BASE64: ${{ secrets.ENV_FILE_BASE64 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANDROID_KEY_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: ./scripts/generate_secrets.ps1
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=SUPABASE_URL=$env:SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY
      - run: flutter build appbundle --release --dart-define=SUPABASE_URL=$env:SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY
      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    needs: [analyze-test, security-scan, dependency-audit]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build ipa --release --no-codesign --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: build/ios/ipa/*.ipa

  build-web:
    name: Build Web
    needs: [analyze-test, security-scan, dependency-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: build/web

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: release/android
      - uses: actions/download-artifact@v4
        with:
          name: ios-artifact
          path: release/ios
      - uses: actions/download-artifact@v4
        with:
          name: web-artifact
          path: release/web
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/android/**
            release/ios/**
            release/web/**

  deploy-web:
    name: Deploy Web
    if: github.ref == 'refs/heads/main'
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-artifact
          path: build/web
      - run: npm install -g vercel
      - env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: vercel deploy build/web --prod --confirm --token $VERCEL_TOKEN
